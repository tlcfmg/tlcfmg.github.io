baseURL: "https://tlcfmg.github.io/"
title: "TLC-FMG AI Tools"
theme: PaperMod
defaultContentLanguage: en

pagination:
  pagerSize: 100

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

languages:
  en:
    languageName: English
    weight: 1
    params:
      homeInfoParams:
        Content: "This page catalogues open source tools for teaching and learning maintained by the Teaching and Learning Centre at the University of Amsterdam's Faculty of Social and Behavioural Sciences."
    menu:
      main:
        - identifier: tlc-main
          name: Main site
          url: https://tlc.uva.nl/en/article-faculty/fmg-en/
          weight: 10
  nl:
    languageName: Nederlands
    weight: 2
    params:
      homeInfoParams:
        Content: "Deze pagina catalogiseert open source tools voor onderwijs en leren, onderhouden door het Teaching and Learning Centre van de Faculteit der Maatschappij- en Gedragswetenschappen van de Universiteit van Amsterdam."
    menu:
      main:
        - identifier: tlc-main
          name: Hoofdwebsite
          url: https://tlc.uva.nl/en/article-faculty/fmg-en/
          weight: 10

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: "TLC-FMG AI Tools"
  description: "Open source tools for teaching and learning maintained by the Teaching and Learning Centre (TLC-FMG) at the University of Amsterdam's Faculty of Social and Behavioural Sciences"
  keywords: [Education, Teaching, Learning, OpenSource, University, Tools, TLC, FMG, UVA]
  author: "TLC-FMG at University of Amsterdam"
  # author: ["Me", "You"] # multiple authors
  images: ["<link or path of image for opengraph, twitter-cards>"]
  DateFormat: "January 2, 2006"
  defaultTheme: auto # dark, light
  disableThemeToggle: false

  ShowReadingTime: false
  ShowShareButtons: true
  ShowPostNavLinks: false
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideAuthor: true
  hideSummary: false
  showtoc: false
  tocopen: false

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
    safari_pinned_tab: "/favicon-32x32.png"

  label:
    text: "TLC-FMG AI Tools"
    icon: /apple-touch-icon.png
    iconHeight: 35

  # profile-mode
  profileTLC-FMG:
    enabled: false # needs to be explicitly set
    title: ExampleSite
    subtitle: "This is subtitle"
    imageUrl: "<img location>"
    imageWidth: 120
    imageHeight: 120
    imageTitle: my image
    buttons:
      - name: Posts
        url: posts
      - name: Tags
        url: tags

  # home-info mode
  # homeInfoParams is now defined per language in the languages section above

  socialIcons:
    - name: Email
      url: "mailto:tlc-fmg@uva.nl"
    - name: LinkedIn
      url: "https://www.linkedin.com/company/tlc-fmg/"
    - name: github
      url: "https://github.com/tlcfmg"
    - name: website
      url: "https://tlc.uva.nl/en/article-faculty/fmg-en"

  analytics:
    google:
      SiteVerificationTag: "XYZabc"
    bing:
      SiteVerificationTag: "XYZabc"
    yandex:
      SiteVerificationTag: "XYZabc"

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  editPost:
    URL: "https://github.com/tlcfmg/tlcfmg.github.io/tree/main/content"
    Text: "Suggest Changes" # edit text
    appendFilePath: true # to append file path to Edit link

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]
# Menu is now defined per language in the languages section above
# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
copyright: '[TLC-FMG University of Amsterdam](https://tlc.uva.nl/en/article-faculty/fmg-en/)'
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai
